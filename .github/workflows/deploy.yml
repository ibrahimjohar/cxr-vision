name: deploy backend to modal

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "src/**"
      - "configs/**"
      - "modal_app/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install modal and huggingface_hub
        run: |
          python -m pip install --upgrade pip
          pip install modal huggingface_hub

      - name: download checkpoints from huggingface backup
        run: |
          hf download ibrahimjohar/cxr-vision-checkpoints --local-dir outputs/checkpoints

      - name: deploy to modal
        run: |
          modal deploy modal_app/serve.py